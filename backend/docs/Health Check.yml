info:
  name: Health Check
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/health"
  headers:
    - name: X-App-ID
      value: "{{app_id}}"
    - name: Authorization
      value: Bearer {{jwt_token}}
  body:
    type: multipart-form
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
