info:
  name: List Jobs
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/jobs?page=1&limit=10"
  headers:
    - name: X-App-ID
      value: "{{app_id}}"
    - name: Authorization
      value: Bearer {{jwt_token}}
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  body:
    type: multipart-form
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
