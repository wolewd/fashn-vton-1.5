opencollection: 1.0.0

info:
  name: VTON Documentation
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

docs:
  content: |-
    ## Running the backend 

    Make sure you are inside the backend folder:
    ```
    cd backend
    ```

    Running the backend:
    ```
    go run main.go
    ```

    Generate APP_ID and JWT_Token:
    ```
    go run scripts/gen_token.go
    ```

    ## Running the web server

    dont forget to setup your cloudflare tunnel first.

    turn on docker from root folder:
    ```
    docker compose up -d
    ```

    check ip:
    ```
    docker inspect -f '{{range .NetworkSettings.Networks}}{{.Gateway}}{{end}}' nginx-proxy-manager
    ```

    setup your nginx-proxy-manager
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
